
x-common-environment: &common-env
  APP_HOME: ${APP_HOME:-./}
  CHEMBIENCE_UID: ${CHEMBIENCE_UID:-1000}
  CHEMBIENCE_GID: ${CHEMBIENCE_GID:-1000}
  FASTAPI_CONNECTION_PORT: ${FASTAPI_CONNECTION_PORT:-8002}
  POSTGRES_USER: ${POSTGRES_USER:-chembience}
  POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-secure-password-here}
  POSTGRES_NAME: ${POSTGRES_NAME:-chembience}
  POSTGRES_HOST: ${POSTGRES_HOST:-postgres}
  POSTGRES_PORT: ${POSTGRES_PORT:-5433}
  POSTGRES_INTERNAL_PORT: 5432

services:
  fastapi:
    image: chembience/core-fastapi${APP_NAME}:${CHEMBIENCE_IMAGE_TAG:-latest}
    build:
      context: .
      dockerfile: Dockerfile
      args:
        build_tag: ${CHEMBIENCE_VERSION:-latest}
        app_name: ${APP_NAME:-}
        conda_py: ${CONDA_PY:-3.14}
    environment:
      <<: *common-env
      APP_NAME: ${APP_NAME:--app}
    depends_on:
      postgres:
        condition: service_healthy
    ports:
      - "${FASTAPI_CONNECTION_PORT}:8000"
    volumes:
      - .:/home/app
    networks:
      - app-network
    working_dir: "/home/app/src/"
    entrypoint: [ "/docker-entrypoint.sh" ]
    # Use env-configurable worker count; default to a modest value to reduce
    # startup contention during DB initialization in test-builds.
    command: ["sh", "-c", "exec uvicorn main:app --host 0.0.0.0 --port 8000 --workers ${UVICORN_WORKERS:-2}"]
    healthcheck:
      test: ["CMD", "curl", "-fsS", "http://localhost:8000/healthz"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 60s

  postgres:
    image: chembience/core-rdkit-postgres:${CHEMBIENCE_VERSION:-latest}
    volumes:
      - ./postgres:/home/postgres
    environment:
      <<: *common-env
    ports:
      - "${POSTGRES_PORT:-5433}:5432"
    networks:
      - app-network
    working_dir: "/home/postgres/"
    entrypoint: [ "/docker-entrypoint.sh" ]
    command: [ "gosu", "app", "postgres", "-D", "/home/postgres/postgres_data" ]
    healthcheck:
      test: [ "CMD-SHELL", "pg_isready -U $$POSTGRES_USER -d $$POSTGRES_NAME -p 5432" ]
      interval: 10s
      timeout: 5s
      retries: 10

volumes:
  postgres-db-volume:

networks:
  app-network:
    {}
  chembience-network:
    name: chembience-network
    external: true
