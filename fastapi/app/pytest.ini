[pytest]
# Run from inside the fastapi container's APP_HOME (/home/app), e.g.:
#   docker compose exec fastapi pytest
# or from the host on a developer checkout:
#   pytest -c core/fastapi/app/pytest.ini
testpaths = src/tests
python_files = test_*.py
python_classes = Test*
python_functions = test_*
addopts = -ra --strict-markers
