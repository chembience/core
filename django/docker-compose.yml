
x-common-environment: &common-env
  APP_HOME: ${APP_HOME:-./}
  CHEMBIENCE_UID: ${CHEMBIENCE_UID:-1000}
  CHEMBIENCE_GID: ${CHEMBIENCE_GID:-1000}
  DJANGO_VIRTUAL_HOSTNAME: ${DJANGO_VIRTUAL_HOSTNAME:-localhost}
  DJANGO_CONNECTION_PORT: ${DJANGO_CONNECTION_PORT:-8001}
  DJANGO_SUPERUSER_PASSWORD: ${DJANGO_SUPERUSER_PASSWORD:-change-me-immediately}
  DJANGO_SUPERUSER_USERNAME: ${DJANGO_SUPERUSER_USERNAME:-admin}
  DJANGO_SUPERUSER_EMAIL: ${DJANGO_SUPERUSER_EMAIL:-admin@example.com}
  POSTGRES_USER: ${POSTGRES_USER:-chembience}
  POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-secure-password-here}
  POSTGRES_NAME: ${POSTGRES_NAME:-chembience}
  POSTGRES_HOST: ${POSTGRES_HOST:-postgres}
  POSTGRES_PORT: ${POSTGRES_PORT:-5433}
  POSTGRES_INTERNAL_PORT: 5432

services:
  django:
    image: chembience/core-django-${APP_NAME:-app}:${CHEMBIENCE_IMAGE_TAG:-latest}
    build:
      context: .
      dockerfile: Dockerfile
      args:
        build_tag: ${CHEMBIENCE_VERSION:-latest}
        app_name: ${APP_NAME:-}
        conda_py: ${CONDA_PY:-3.14}
    environment:
      <<: *common-env
      APP_NAME: ${APP_NAME:-app}
    depends_on:
      postgres:
        condition: service_healthy
    ports:
      - "${DJANGO_CONNECTION_PORT}:8000"
    volumes:
      - .:/home/app
    networks:
      - app-network
    working_dir: "/home/app/src/"
    entrypoint: [ "/docker-entrypoint.sh" ]
    command: ["python", "-m", "gunicorn", "src.wsgi:application", "--bind", "0.0.0.0:8000", "--workers", "8"]
    healthcheck:
      test: ["CMD", "curl", "-fsS", "http://localhost:8000/healthz/"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 20s

  postgres:
    image: chembience/core-rdkit-postgres:${CHEMBIENCE_VERSION:-latest}
    volumes:
      - ./postgres:/home/postgres
    environment:
      <<: *common-env
    # No host port is published; connect via internal network on 5432.
    networks:
      - app-network
    working_dir: "/home/postgres/"
    entrypoint: [ "/docker-entrypoint.sh" ]
    command: [ "gosu", "app", "postgres", "-D", "/home/postgres/postgres_data" ]
    healthcheck:
      test: [ "CMD-SHELL", "pg_isready -U $$POSTGRES_USER -d $$POSTGRES_NAME -p 5432" ]
      interval: 10s
      timeout: 5s
      retries: 10

volumes:
  postgres-db-volume:

networks:
  app-network:
    {}
  chembience-network:
    name: chembience-network
    external: true