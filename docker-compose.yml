
x-common-environment: &common-env
  CHEMBIENCE_VERSION: ${CHEMBIENCE_VERSION:-latest}
  APP_HOME: ${APP_HOME}
  CHEMBIENCE_UID: ${CHEMBIENCE_UID:-1000}
  CHEMBIENCE_GID: ${CHEMBIENCE_GID:-1000}
  DJANGO_VIRTUAL_HOSTNAME: ${DJANGO_VIRTUAL_HOSTNAME:-localhost}
  DJANGO_CONNECTION_PORT: ${DJANGO_CONNECTION_PORT:-8000}
  DJANGO_SUPERUSER_PASSWORD: ${DJANGO_SUPERUSER_PASSWORD}
  DJANGO_SUPERUSER_USERNAME: ${DJANGO_SUPERUSER_USERNAME}
  DJANGO_SUPERUSER_EMAIL: ${DJANGO_SUPERUSER_EMAIL}
  POSTGRES_USER: chembience
  POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
  POSTGRES_NAME: ${POSTGRES_NAME:-chembience}
  POSTGRES_HOST: ${POSTGRES_HOST:-postgres}
  POSTGRES_PORT: ${POSTGRES_PORT:-5432}

services:

  rdkit:
    image: chembience/core-rdkit:${CHEMBIENCE_VERSION}
    build:
      context: rdkit/
      args:
        conda_package: 'condaforge/miniforge3'
        conda_tag: 'latest'
        conda_py: '3.12'
        rdkit_version: '2025.09.3'
    environment:
      <<: *common-env
    working_dir: "/home/app"
    networks:
      - app-network
    entrypoint: [ "/docker-entrypoint.sh" ]
    tty: true
    command: [ "python" ]

  django:
    image: chembience/core-django:${CHEMBIENCE_VERSION}
    build:
      context: .
      dockerfile: django/Dockerfile
      args:
        build_tag: ${CHEMBIENCE_VERSION}
    environment:
      <<: *common-env
    depends_on:
      postgres:
        condition: service_healthy
    ports:
      - "${DJANGO_CONNECTION_PORT}:8000"
    volumes:
      - ${APP_HOME}:/home/app
    networks:
      - app-network
    working_dir: "/home/app/appsite/"
    entrypoint: [ "/docker-entrypoint.sh" ]
    command: ["python", "-m", "gunicorn", "appsite.wsgi:application", "--bind", "0.0.0.0:8000", "--workers", "8"]
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/simple/resolver/CCO"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 20s

  postgres:
    image: chembience/core-rdkit-postgres:${CHEMBIENCE_VERSION}
    build:
      context: .
      dockerfile: postgres/Dockerfile
      args:
        build_tag: ${CHEMBIENCE_VERSION}
    volumes:
      - ${APP_HOME}/postgres:/home/postgres
    environment:
      <<: *common-env
    ports:
      - "5432:5432"
    networks:
      - app-network
    working_dir: "/home/postgres/"
    entrypoint: [ "/docker-entrypoint.sh" ]
    command: [ "gosu", "app", "postgres", "-D", "/home/postgres/postgres_data" ]
    healthcheck:
      test: [ "CMD-SHELL", "pg_isready -U chembience" ]
      interval: 10s
      timeout: 5s
      retries: 10

volumes:
  postgres-db-volume:

networks:
  app-network:
    name: app-backend
  chembience-network:
    name: chembience-network