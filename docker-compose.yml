x-common-environment: &common-env
  CHEMBIENCE_VERSION: ${CHEMBIENCE_VERSION:-latest}
  APP_HOME: ${APP_HOME}
  CHEMBIENCE_UID: ${CHEMBIENCE_UID:-1000}
  CHEMBIENCE_GID: ${CHEMBIENCE_GID:-1000}
  DJANGO_VIRTUAL_HOSTNAME: ${DJANGO_VIRTUAL_HOSTNAME:-localhost}
  DJANGO_CONNECTION_PORT: ${DJANGO_CONNECTION_PORT:-8001}
  DJANGO_SUPERUSER_PASSWORD: ${DJANGO_SUPERUSER_PASSWORD}
  DJANGO_SUPERUSER_USERNAME: ${DJANGO_SUPERUSER_USERNAME}
  DJANGO_SUPERUSER_EMAIL: ${DJANGO_SUPERUSER_EMAIL}
  # Forwarded to the django container. If left empty, the django entrypoint
  # auto-generates a strong key on first init and persists it in the
  # project's .env (next to docker-compose.yml in the bind-mounted APP_HOME).
  DJANGO_SECRET_KEY: ${DJANGO_SECRET_KEY:-}
  DJANGO_DEBUG: ${DJANGO_DEBUG:-False}
  FASTAPI_CONNECTION_PORT: ${FASTAPI_CONNECTION_PORT:-8002}
  JUPYTER_CONNECTION_PORT: ${JUPYTER_CONNECTION_PORT:-8888}
  # If set, can be used to secure Jupyter; see jupyter service command below.
  JUPYTER_TOKEN: ${JUPYTER_TOKEN:-}
  GUNICORN_WORKERS: ${GUNICORN_WORKERS:-8}
  UVICORN_WORKERS: ${UVICORN_WORKERS:-2}
  APP_NAME: ${APP_NAME:-}
  POSTGRES_USER: ${POSTGRES_USER:-chembience}
  POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
  POSTGRES_NAME: ${POSTGRES_NAME:-chembience}
  POSTGRES_HOST: ${POSTGRES_HOST:-postgres}
  # In-network port used by services to connect to the postgres container.
  POSTGRES_PORT: 5432
  # Backwards-compatible alias kept for code that still reads POSTGRES_INTERNAL_PORT.
  POSTGRES_INTERNAL_PORT: 5432

services:

  rdkit:
    image: chembience/core-rdkit:${CHEMBIENCE_VERSION:-latest}
    build:
      context: .
      dockerfile: rdkit/Dockerfile
      args:
        mamba_image: 'mambaorg/micromamba:1.5.8'
        conda_py: ${CONDA_PY:-3.14}
        rdkit_version: ${RDKIT_VERSION:-2026.03.2}
        apt_mirror: ${APT_MIRROR:-}
        conda_mirror: ${CONDA_MIRROR:-}
    environment:
      <<: *common-env
    working_dir: "/home/app"
    networks:
      - app-network
    restart: "no"
    entrypoint: [ "/docker-entrypoint.sh" ]
    tty: true
    command: [ "python" ]

  rdkit-app:
    image: chembience/core-rdkit${APP_NAME:--app}:${CHEMBIENCE_VERSION}
    build:
      context: rdkit/app
      dockerfile: Dockerfile
      args:
        build_tag: ${CHEMBIENCE_VERSION}
        app_name: ${APP_NAME:-}
    environment:
      <<: *common-env
      APP_NAME: ${APP_NAME:--app}
    depends_on:
      postgres:
        condition: service_healthy
    volumes:
      - ${APP_HOME}:/home/app
    networks:
      - app-network
    working_dir: "/home/app"
    restart: unless-stopped
    entrypoint: [ "/docker-entrypoint.sh" ]
    command: ["tail", "-f", "/dev/null"]

  django:
    image: chembience/core-django:${CHEMBIENCE_VERSION}
    build:
      context: .
      dockerfile: django/Dockerfile
      args:
        build_tag: ${CHEMBIENCE_VERSION}
        app_name: ${APP_NAME:-}
        conda_py: ${CONDA_PY:-3.14}
        conda_mirror: ${CONDA_MIRROR:-}
    environment:
      <<: *common-env
      APP_NAME: ${APP_NAME:--app}
    depends_on:
      postgres:
        condition: service_healthy
    ports:
      - "${DJANGO_CONNECTION_PORT}:8000"
    volumes:
      - ${APP_HOME}:/home/app
    networks:
      - app-network
    working_dir: "/home/app/src/"
    restart: unless-stopped
    entrypoint: [ "/docker-entrypoint.sh" ]
    command: ["sh", "-c", "exec python -m gunicorn src.wsgi:application --bind 0.0.0.0:8000 --workers ${GUNICORN_WORKERS:-8}"]
    healthcheck:
      test: ["CMD", "curl", "-fsS", "http://localhost:8000/healthz/"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 45s

  fastapi:
    image: chembience/core-fastapi:${CHEMBIENCE_VERSION}
    build:
      context: .
      dockerfile: fastapi/Dockerfile
      args:
        build_tag: ${CHEMBIENCE_VERSION}
        app_name: ${APP_NAME:-}
        conda_py: ${CONDA_PY:-3.14}
        conda_mirror: ${CONDA_MIRROR:-}
    environment:
      <<: *common-env
      APP_NAME: ${APP_NAME:--app}
    depends_on:
      postgres:
        condition: service_healthy
    ports:
      - "${FASTAPI_CONNECTION_PORT}:8000"
    volumes:
      - ${APP_HOME}:/home/app
    networks:
      - app-network
    working_dir: "/home/app/src/"
    restart: unless-stopped
    entrypoint: [ "/docker-entrypoint.sh" ]
    command: ["sh", "-c", "exec uvicorn main:app --host 0.0.0.0 --port 8000 --workers ${UVICORN_WORKERS:-2}"]
    healthcheck:
      test: ["CMD", "curl", "-fsS", "http://localhost:8000/healthz"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 90s

  jupyter:
    image: chembience/core-jupyter:${CHEMBIENCE_VERSION}
    build:
      context: .
      dockerfile: jupyter/Dockerfile
      args:
        build_tag: ${CHEMBIENCE_VERSION}
        app_name: ${APP_NAME:-}
        conda_py: ${CONDA_PY:-3.14}
        conda_mirror: ${CONDA_MIRROR:-}
    environment:
      <<: *common-env
      APP_NAME: ${APP_NAME:--app}
    depends_on:
      postgres:
        condition: service_healthy
    ports:
      - "${JUPYTER_CONNECTION_PORT}:8888"
    volumes:
      - ${APP_HOME}:/home/app
    networks:
      - app-network
    working_dir: "/home/app"
    restart: unless-stopped
    entrypoint: [ "/docker-entrypoint.sh" ]
    # Note: Do NOT disable the token by default. If JUPYTER_TOKEN is set,
    # you may override this command in a compose override file to add
    # "--ServerApp.token=$JUPYTER_TOKEN".
    command: ["jupyter", "lab", "--ip=0.0.0.0", "--port=8888", "--no-browser", "--allow-root"]
    healthcheck:
      test: ["CMD", "curl", "-fsS", "http://localhost:8888/api"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 45s

  postgres:
    image: chembience/core-rdkit-postgres:${CHEMBIENCE_VERSION}
    build:
      context: .
      dockerfile: postgres/Dockerfile
      args:
        build_tag: ${CHEMBIENCE_VERSION}
        apt_mirror: ${APT_MIRROR:-}
        conda_py: ${CONDA_PY:-3.14}
        conda_mirror: ${CONDA_MIRROR:-}
        CHEMBIENCE_UID: ${CHEMBIENCE_UID:-1000}
        CHEMBIENCE_GID: ${CHEMBIENCE_GID:-1000}
    volumes:
      - ${APP_HOME}/postgres:/home/postgres
    environment:
      <<: *common-env
    # Note: No host port is published; services connect via the internal network on 5432.
    networks:
      - app-network
    working_dir: "/home/postgres/"
    restart: unless-stopped
    entrypoint: [ "/docker-entrypoint.sh" ]
    command: [ "gosu", "app", "postgres", "-D", "/home/postgres/postgres_data" ]
    healthcheck:
      test: [ "CMD-SHELL", "pg_isready -U $$POSTGRES_USER -d $$POSTGRES_NAME -p 5432" ]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 20s

networks:
  app-network:
    {}
  chembience-network:
    name: chembience-network
    external: true
