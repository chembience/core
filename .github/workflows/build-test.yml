name: Build & Smoke Test

on:
  push:
    branches: [ main, 'dev/*']
  pull_request:
    branches: [main, 'dev/*']
  workflow_dispatch:

jobs:
  smoke:
    name: Build & init (${{ matrix.app }})
    runs-on: ubuntu-latest
    timeout-minutes: 30
    strategy:
      fail-fast: false
      matrix:
        app: [rdkit, django, fastapi, jupyter]
    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Free up disk space
        run: |
          sudo rm -rf /usr/share/dotnet /usr/local/lib/android /opt/ghc \
                      /opt/hostedtoolcache/CodeQL || true
          docker system prune -af || true
          df -h

      - name: Prepare .env
        run: |
          if [ -f .env.example ]; then
            cp .env.example .env
          fi

      - name: Make helper scripts executable
        run: |
          chmod +x build remove psql || true
          find . -type f \( -name "*-init" -o -name "*-configure" \
                        -o -name "docker-entrypoint.sh" \) \
            -exec chmod +x {} +

      - name: Build & init ${{ matrix.app }}
        run: |
          set -euo pipefail
          mkdir -p ./test-builds
          TEST_DIR_ABS="$(realpath ./test-builds)"
          ./build "${{ matrix.app }}" "${{ matrix.app }}" -d "$TEST_DIR_ABS"
          cd "$TEST_DIR_ABS/${{ matrix.app }}"
          if [ -f "./${{ matrix.app }}-init" ]; then
            "./${{ matrix.app }}-init"
          elif [ -f "./src/${{ matrix.app }}-init" ]; then
            "./src/${{ matrix.app }}-init"
          else
            echo "❌ Could not find ${{ matrix.app }}-init"
            ls -R .
            exit 1
          fi

      - name: Verify RDKit and Python versions
        run: |
          set -euo pipefail
          TEST_DIR_ABS="$(realpath ./test-builds)"
          cd "$TEST_DIR_ABS/${{ matrix.app }}"
          
          # Extract expected versions from .env
          
          EXPECTED_PYTHON=$(grep '^CONDA_PY=' .env | cut -d '=' -f 2 | xargs)
          EXPECTED_RDKIT=$(grep '^RDKIT_VERSION=' .env | cut -d '=' -f 2 | xargs)
          
          echo "Expected Python: '$EXPECTED_PYTHON'"
          echo "Expected RDKit: '$EXPECTED_RDKIT'"
          
          # Get actual versions from container
          # The service name is matrix.app (django, fastapi, jupyter, rdkit)
          # but for rdkit we use rdkit-app as the long-running sidecar
          SERVICE_NAME="${{ matrix.app }}"
          if [ "$SERVICE_NAME" == "rdkit" ]; then
            SERVICE_NAME="rdkit-app"
          fi
          
          # Load APP_NAME from .env if it exists, or use default
          # The build script sets APP_NAME to -$TARGET
          # In build-test.yml, TARGET is ${{ matrix.app }}
          export APP_NAME="-${{ matrix.app }}"
          
          ACTUAL_PYTHON=$(docker compose exec -T "$SERVICE_NAME" python -c "import sys; print(f'{sys.version_info.major}.{sys.version_info.minor}')")
          ACTUAL_RDKIT=$(docker compose exec -T "$SERVICE_NAME" python -c "import rdkit; print(rdkit.__version__)")
          
          echo "Actual Python: $ACTUAL_PYTHON"
          echo "Actual RDKit: $ACTUAL_RDKIT"
          
          if [ "$ACTUAL_PYTHON" != "$EXPECTED_PYTHON" ]; then
            echo "❌ Python version mismatch! Expected '$EXPECTED_PYTHON', got '$ACTUAL_PYTHON'"
            exit 1
          fi
          
          if [ "$ACTUAL_RDKIT" != "$EXPECTED_RDKIT" ]; then
            echo "❌ RDKit version mismatch! Expected '$EXPECTED_RDKIT', got '$ACTUAL_RDKIT'"
            exit 1
          fi
          
          echo "✅ Versions match!"

      - name: Dump docker state on failure
        if: failure()
        run: |
          docker ps -a || true
          docker images || true
          df -h || true
