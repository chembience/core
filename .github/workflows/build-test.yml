name: Build & Smoke Test

on:
  push:
    branches: [ main, 'dev/*']
  pull_request:
    branches: [main, 'dev/*']
  workflow_dispatch:

jobs:
  smoke:
    name: Build & init (${{ matrix.app }})
    runs-on: ubuntu-latest
    timeout-minutes: 30
    strategy:
      fail-fast: false
      matrix:
        app: [rdkit, django, fastapi, jupyter]
    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Free up disk space
        run: |
          sudo rm -rf /usr/share/dotnet /usr/local/lib/android /opt/ghc \
                      /opt/hostedtoolcache/CodeQL || true
          docker system prune -af || true
          df -h

      - name: Prepare .env
        run: |
          if [ -f .env.example ]; then
            cp .env.example .env
          fi

      - name: Make helper scripts executable
        run: |
          chmod +x build remove psql || true
          find . -type f \( -name "*-init" -o -name "*-configure" \
                        -o -name "docker-entrypoint.sh" \) \
            -exec chmod +x {} +

      - name: Build & init ${{ matrix.app }}
        run: |
          set -euo pipefail
          mkdir -p ./test-builds
          TEST_DIR_ABS="$(realpath ./test-builds)"
          ./build "${{ matrix.app }}" "${{ matrix.app }}" -d "$TEST_DIR_ABS"
          cd "$TEST_DIR_ABS/${{ matrix.app }}"
          if [ -f "./${{ matrix.app }}-init" ]; then
            "./${{ matrix.app }}-init"
          elif [ -f "./src/${{ matrix.app }}-init" ]; then
            "./src/${{ matrix.app }}-init"
          else
            echo "❌ Could not find ${{ matrix.app }}-init"
            ls -R .
            exit 1
          fi

      - name: Dump docker state on failure
        if: failure()
        run: |
          docker ps -a || true
          docker images || true
          df -h || true
