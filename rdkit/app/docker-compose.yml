
x-common-environment: &common-env
  APP_HOME: ${APP_HOME}
  CHEMBIENCE_UID: ${CHEMBIENCE_UID:-1000}
  CHEMBIENCE_GID: ${CHEMBIENCE_GID:-1000}
  POSTGRES_USER: chembience
  POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
  POSTGRES_NAME: ${POSTGRES_NAME:-chembience}
  POSTGRES_HOST: ${POSTGRES_HOST:-postgres}
  POSTGRES_PORT: ${POSTGRES_PORT:-5432}

services:
  rdkit:
    image: chembience/core-rdkit${APP_NAME}:${CHEMBIENCE_IMAGE_TAG:-latest}
    build:
      context: .
      dockerfile: Dockerfile
      args:
        build_tag: ${CHEMBIENCE_VERSION:-latest}
        apt_mirror: ${APT_MIRROR:-}
        conda_py: ${CONDA_PY:-3.14}
        conda_mirror: ${CONDA_MIRROR:-}
    environment:
      <<: *common-env
      APP_NAME: ${APP_NAME:--app}
    depends_on:
      postgres:
        condition: service_healthy
    volumes:
      - .:/home/app
    networks:
      - app-network
    working_dir: "/home/app"
    entrypoint: [ "/docker-entrypoint.sh" ]
    command: ["tail", "-f", "/dev/null"]

  postgres:
    image: chembience/core-rdkit-postgres:${CHEMBIENCE_VERSION:-latest}
    volumes:
      - ./postgres:/home/postgres
    environment:
      <<: *common-env
    ports:
      - "5432:5432"
    networks:
      - app-network
    working_dir: "/home/postgres/"
    entrypoint: [ "/docker-entrypoint.sh" ]
    command: [ "gosu", "app", "postgres", "-D", "/home/postgres/postgres_data" ]
    healthcheck:
      test: [ "CMD-SHELL", "pg_isready -U chembience" ]
      interval: 10s
      timeout: 5s
      retries: 10

volumes:
  postgres-db-volume:

networks:
  app-network:
    name: app-backend
  chembience-network:
    name: chembience-network
